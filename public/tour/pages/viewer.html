<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour360 — Visualiseur</title>
  <link rel="icon" type="image/x-icon" href="/tour/assets/logo_360.png" />

  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    :root {
      --bg:        #080c12;
      --panel:     rgba(13,17,23,0.88);
      --border:    rgba(48,54,61,0.7);
      --text:      #e6edf3;
      --muted:     #7d8590;
      --accent:    #f0a30a;
      --blue:      #3b82f6;
      --green:     #10b981;
      --red:       #ef4444;
      --radius:    10px;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Viewer plein écran ─────────────────────────────────────── */
    #viewer {
      position: fixed; inset: 0;
      cursor: grab;
    }
    #viewer.cursor-pointer { cursor: pointer; }
    #viewer.cursor-grabbing { cursor: grabbing; }

    /* ── Header flottant ────────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 52px;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      background: linear-gradient(to bottom, rgba(8,12,18,0.9) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .header-logo {
      display: flex; align-items: center; gap: 8px;
      pointer-events: auto;
    }
    .header-logo svg { color: var(--accent); }
    .header-logo-text {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text); opacity: 0.7;
    }

    #header-scene-name {
      font-size: 14px; font-weight: 500;
      color: var(--text); opacity: 0.9;
      pointer-events: none;
    }

    #header-separator { flex: 1; }

    #btn-edit-link {
      pointer-events: auto;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    #btn-edit-link:hover { color: var(--text); border-color: rgba(240,163,10,0.4); }

    /* ── Minimap des scènes (bas gauche) ────────────────────────── */
    #scene-map {
      position: fixed; bottom: 24px; left: 20px;
      display: flex; flex-direction: column; gap: 4px;
      z-index: 10;
      max-height: 60vh;
      overflow-y: auto;
    }
    #scene-map::-webkit-scrollbar { width: 3px; }
    #scene-map::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .scene-dot {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.15s;
      max-width: 180px;
    }
    .scene-dot:hover { border-color: rgba(240,163,10,0.5); background: rgba(13,17,23,0.95); }
    .scene-dot.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(240,163,10,0.2), inset 3px 0 0 var(--accent);
    }
    .scene-dot-indicator {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background 0.15s;
    }
    .scene-dot.active .scene-dot-indicator { background: var(--accent); }
    .scene-dot-name {
      font-size: 12px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text); opacity: 0.8;
    }
    .scene-dot.active .scene-dot-name { opacity: 1; }

    /* ── Contrôles bas droite ───────────────────────────────────── */
    #controls-hint {
      position: fixed; bottom: 24px; right: 20px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
      z-index: 10;
      pointer-events: none;
    }

    .hint-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px; color: var(--muted);
      font-family: var(--font-mono);
      backdrop-filter: blur(8px);
    }
    .hint-pill svg { flex-shrink: 0; }

    /* ── Info overlay ───────────────────────────────────────────── */
    #info-overlay {
      position: fixed; top: 70px; right: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      max-width: 300px;
      backdrop-filter: blur(12px);
      display: none;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #info-overlay.visible { display: block; animation: fadeInDown 0.2s ease; }

    #info-close {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; line-height: 1;
      padding: 4px 6px; border-radius: 4px;
    }
    #info-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .info-tag {
      font-family: var(--font-mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--green); margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    #info-title {
      font-size: 16px; font-weight: 600;
      color: var(--text); margin-bottom: 10px; line-height: 1.3;
    }
    #info-desc {
      font-size: 13px; color: var(--muted);
      line-height: 1.6;
    }

    /* ── Navigation toast (transition de scène) ─────────────────── */
    #nav-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid rgba(240,163,10,0.4);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 13px; color: var(--accent);
      font-family: var(--font-mono);
      backdrop-filter: blur(8px);
      display: none;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
    }
    #nav-toast.visible { display: block; animation: fadeInUp 0.2s ease; }

    /* ── Loading screen ─────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 100;
    }
    #loading.hidden { display: none; }

    .loader-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(240,163,10,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      font-family: var(--font-mono); font-size: 12px;
      color: var(--muted); letter-spacing: 0.08em;
    }

    /* ── Écran d'erreur ─────────────────────────────────────────── */
    #error-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    #error-screen.visible { display: flex; }
    .error-icon { color: var(--red); opacity: 0.6; }
    .error-title {
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      color: var(--text);
    }
    .error-msg { font-size: 13px; color: var(--muted); max-width: 400px; text-align: center; }
    .error-hint {
      margin-top: 8px;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); opacity: 0.6;
      background: rgba(255,255,255,0.04);
      padding: 8px 16px; border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes fadeInDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translate(-50%,8px); } to { opacity:1; transform:translate(-50%,0); } }
  </style>
</head>
<body>

  <!-- Viewer 3D -->
  <div id="viewer"></div>

  <!-- Header -->
  <div id="header">
    <div class="header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        <path d="M2 12h20"/>
      </svg>
      <span class="header-logo-text">Tour360</span>
    </div>
    <span id="header-scene-name"></span>
    <div id="header-separator"></div>
    <a id="btn-edit-link" href="/tour/pages/editor.html" title="Ouvrir l'éditeur">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Éditeur
    </a>
  </div>

  <!-- Minimap scènes -->
  <div id="scene-map"></div>

  <!-- Contrôles hint -->
  <div id="controls-hint">
    <div class="hint-pill">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4M12 16h.01"/>
      </svg>
      Clic = interagir
    </div>
    <div class="hint-pill">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
      </svg>
      Glisser = pivoter
    </div>
  </div>

  <!-- Info overlay -->
  <div id="info-overlay">
    <button id="info-close">✕</button>
    <div class="info-tag">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Information
    </div>
    <div id="info-title"></div>
    <div id="info-desc"></div>
  </div>

  <!-- Toast de navigation -->
  <div id="nav-toast"></div>

  <!-- Loading -->
  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loader-text">Chargement de la visite…</div>
  </div>

  <!-- Erreur -->
  <div id="error-screen">
    <svg class="error-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
    </svg>
    <div class="error-title">Impossible de charger la visite</div>
    <div id="error-msg" class="error-msg"></div>
    <div class="error-hint">Usage : /pages/viewer.html?tour=mon-fichier.json</div>
  </div>

  <script type="module" src="/tour/scripts/viewer.js"></script>
</body>
</html>
